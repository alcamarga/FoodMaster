version: '3.8'

services:
  # Frontend en Angular con Nginx
  frontend_pizzeria:
    build:
      context: ./frontend
    ports:
      - "80:80"
    depends_on:
      - app_pizzeria
    restart: always

  # Backend en Flask con SQLite local
  app_pizzeria:
    build: .
    ports:
      - "5000:5000"
    environment:
      # Español: SQLite por defecto — sin depender de PostgreSQL externo
      # English: SQLite by default — no external PostgreSQL dependency
      - DATABASE_URL=sqlite:///foodmaster.db
    volumes:
      - foodmaster_data:/app/instance

volumes:
  foodmaster_data: