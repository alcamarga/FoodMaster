<!--
  **Creado por:** Camilo Martinez Galarza (CMG-Solutions)
  **Fecha:** 15 de junio de 2026
  **Estado:** Refactorizado
  Modificaciones: Se eliminó la tabla de Pedidos Recientes y el modal de detalle para simplificar la vista.
  La gestión de pedidos ahora se accede exclusivamente desde la pestaña "Gestión de Pedidos".

  Plantilla del panel de administración | Admin dashboard template
-->

<div class="dashboard-container">
  <h1 class="text-center text-white fw-bold mb-4" style="text-shadow: 0 2px 8px rgba(0,0,0,0.5);">
    🏪 Panel de Administración
  </h1>

  <!-- Encabezado limpio: sin KPIs redundantes. Los reportes financieros se acceden desde la pestaña Cierre y Finanzas. | Clean header: no redundant KPIs. Financial reports are accessed from the Cierre y Finanzas tab. -->

  <!-- Menú de navegación por pestañas | Tab navigation menu -->
  <div class="tabs-container mt-4 mb-3 p-3"
    style="background: rgba(0,0,0,0.6); border-radius: 10px; border: 1px solid rgba(212,175,55,0.3);">
    <ul class="nav nav-tabs border-0">
      <li class="nav-item" *ngIf="usuario?.rol === 'admin'">
        <a class="nav-link fw-bold"
          [ngClass]="pestanaActiva === 'menu' ? 'text-dark bg-warning border-warning' : 'text-warning'"
          (click)="cambiarPestana('menu')" style="cursor: pointer; font-size: 1.1rem; border-radius: 8px 8px 0 0;">
          🍽️ Gestión de Menú
        </a>
      </li>
      <li class="nav-item ms-2" *ngIf="usuario?.rol === 'admin'">
        <a class="nav-link fw-bold"
          [ngClass]="pestanaActiva === 'insumos' ? 'text-dark bg-warning border-warning' : 'text-warning'"
          (click)="cambiarPestana('insumos')" style="cursor: pointer; font-size: 1.1rem; border-radius: 8px 8px 0 0;">
          🍽️ Inventario de Insumos
        </a>
      </li>
      <li class="nav-item ms-2">
        <a class="nav-link fw-bold"
          [ngClass]="pestanaActiva === 'pedidos' ? 'text-dark bg-warning border-warning' : 'text-warning'"
          (click)="cambiarPestana('pedidos')" style="cursor: pointer; font-size: 1.1rem; border-radius: 8px 8px 0 0;">
          📋 Gestión de Pedidos
        </a>
      </li>
      <li class="nav-item ms-2" *ngIf="usuario?.rol === 'admin'">
        <a class="nav-link fw-bold"
          [ngClass]="pestanaActiva === 'recetas' ? 'text-dark bg-warning border-warning' : 'text-warning'"
          (click)="cambiarPestana('recetas')" style="cursor: pointer; font-size: 1.1rem; border-radius: 8px 8px 0 0;">
          🥣 Configuración de Recetas
        </a>
      </li>
      <li class="nav-item ms-2" *ngIf="usuario?.rol === 'admin'">
        <a class="nav-link fw-bold"
          [ngClass]="pestanaActiva === 'personal' ? 'text-dark bg-warning border-warning' : 'text-warning'"
          (click)="cambiarPestana('personal')" style="cursor: pointer; font-size: 1.1rem; border-radius: 8px 8px 0 0;">
          👥 Gestión de Personal
        </a>
      </li>
      <li class="nav-item ms-2" *ngIf="usuario?.rol === 'admin'">
        <a class="nav-link fw-bold"
          [ngClass]="pestanaActiva === 'rentabilidad' ? 'text-dark bg-warning border-warning' : 'text-warning'"
          (click)="cambiarPestana('rentabilidad')" style="cursor: pointer; font-size: 1.1rem; border-radius: 8px 8px 0 0;">
          📊 Rentabilidad
        </a>
      </li>
      <li class="nav-item ms-2">
        <a class="nav-link fw-bold"
          [ngClass]="pestanaActiva === 'mesas' ? 'text-dark bg-warning border-warning' : 'text-warning'"
          (click)="cambiarPestana('mesas')" style="cursor: pointer; font-size: 1.1rem; border-radius: 8px 8px 0 0;">
          🍽️ Mesas y Comandas
        </a>
      </li>
      <!-- Nueva pestaña de finanzas | New finance tab -->
      <li class="nav-item ms-2" *ngIf="usuario?.rol === 'admin'">
        <a class="nav-link fw-bold"
          [ngClass]="pestanaActiva === 'finanzas' ? 'text-dark bg-warning border-warning' : 'text-success'"
          (click)="cambiarPestana('finanzas')" style="cursor: pointer; font-size: 1.1rem; border-radius: 8px 8px 0 0;">
          🗃️ Cierre y Finanzas
        </a>
      </li>
    </ul>
  </div>

  <!-- Contenido de las pestañas | Tab content -->
  <div class="tab-content">
    <div *ngIf="pestanaActiva === 'menu'">
      <app-dashboard></app-dashboard>
    </div>

    <div *ngIf="pestanaActiva === 'insumos'">
      <app-inventario></app-inventario>
    </div>

    <div *ngIf="pestanaActiva === 'pedidos'">
      <app-gestion-pedidos></app-gestion-pedidos>
    </div>

    <div *ngIf="pestanaActiva === 'recetas' && usuario?.rol === 'admin'">
      <app-configuracion-recetas></app-configuracion-recetas>
    </div>

    <div *ngIf="pestanaActiva === 'personal' && usuario?.rol === 'admin'">
      <app-gestion-personal></app-gestion-personal>
    </div>

    <div *ngIf="pestanaActiva === 'rentabilidad' && usuario?.rol === 'admin'">
      <app-rentabilidad></app-rentabilidad>
    </div>

    <div *ngIf="pestanaActiva === 'mesas'">
      <app-mesas></app-mesas>
    </div>

    <div *ngIf="pestanaActiva === 'finanzas' && usuario?.rol === 'admin'">
      <app-finanzas></app-finanzas>
    </div>
  </div>
</div>
